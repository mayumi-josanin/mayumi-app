<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来院スタンプを開いています</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    :root {
      --bg: #f7f3ec;
      --card: #fffdf9;
      --line: #dfd5c7;
      --text: #46352a;
      --muted: #7f6b5d;
      --accent: #7c9570;
      --accent-dark: #5f7755;
      --accent-soft: #eef4ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(124, 149, 112, 0.18), transparent 36%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 18px 50px rgba(85, 66, 48, 0.12);
      text-align: center;
    }

    .logo {
      width: 82px;
      height: 82px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 8px 28px rgba(58, 43, 28, 0.18);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.5;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
    }

    .status {
      margin: 20px 0 0;
      padding: 16px;
      border-radius: 18px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 700;
      line-height: 1.8;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(124, 149, 112, 0.2);
      border-top-color: var(--accent);
      margin: 18px auto 0;
      animation: spin 0.9s linear infinite;
    }

    .fallback {
      margin-top: 22px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #fff;
      text-align: left;
      display: none;
    }

    .fallback.active {
      display: block;
    }

    .fallback h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--accent-dark);
      text-align: center;
    }

    .fallback p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-outline {
      background: #fff;
      color: var(--accent-dark);
      border: 1px solid var(--line);
    }

    .tiny {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="icon.png" alt="まゆみ助産院">
    <h1>来院スタンプを開いています</h1>
    <p class="lead">
      そのまま数秒お待ちください。<br>
      標準カメラからはアプリを開くだけにし、スタンプは増やしません。
    </p>
    <div id="launchStatus" class="status">アプリを開いています...</div>
    <div class="spinner" aria-hidden="true"></div>

    <section id="fallbackPanel" class="fallback">
      <h2>アプリが開かない場合</h2>
      <p>
        標準カメラで読んだ時は、アプリを開くだけです。来院スタンプは付きません。<br>
        アプリを開いた後、アプリ内の「カメラを起動して読み取る」から同じQRコードを読み取ると来院スタンプが付きます。
      </p>
      <div class="actions">
        <button id="openAppBtn" class="btn btn-primary" type="button">アプリを開く</button>
        <a id="openRegistrationBtn" class="btn btn-outline" href="./index.html">アプリ登録画面を開く</a>
      </div>
      <div class="tiny">
        すでに登録済みの方は、新規登録ではなくアプリ内の「以前登録した方はこちら ↺」からお進みください。<br>
        iPhone標準カメラからホーム画面追加アプリを直接開けない端末では、この画面で止まる場合があります。
      </div>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const appUrl = 'mayumijosanin://stamp?open=home';
      const fallbackPanel = document.getElementById('fallbackPanel');
      const launchStatus = document.getElementById('launchStatus');
      const openAppBtn = document.getElementById('openAppBtn');
      const openRegistrationBtn = document.getElementById('openRegistrationBtn');
      let fallbackTimer = null;

      const registrationUrl = new URL('./index.html', window.location.href);
      openRegistrationBtn.href = registrationUrl.toString();

      function clearFallbackTimer() {
        if (!fallbackTimer) return;
        window.clearTimeout(fallbackTimer);
        fallbackTimer = null;
      }

      function scheduleFallback() {
        clearFallbackTimer();
        fallbackTimer = window.setTimeout(function () {
          fallbackPanel.classList.add('active');
          launchStatus.textContent = 'アプリが開かない場合は下の案内をご確認ください';
        }, 1800);
      }

      function openApp() {
        launchStatus.textContent = 'アプリを開いています...';
        fallbackPanel.classList.remove('active');
        scheduleFallback();

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = appUrl;
        document.body.appendChild(iframe);
        window.setTimeout(function () {
          iframe.remove();
        }, 1200);

        window.location.href = appUrl;
      }

      openAppBtn.addEventListener('click', function () {
        openApp();
      });

      window.addEventListener('pagehide', clearFallbackTimer);
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) clearFallbackTimer();
      });

      openApp();
    })();
  </script>
</body>

</html>
