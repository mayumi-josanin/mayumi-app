<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7efe7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="24" y="24" width="1392" height="852" rx="36" fill="none" stroke="#e0d7ce" stroke-width="2"/>
  <text x="56" y="78" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="40" font-weight="800" fill="#332b27" text-anchor="start">カメラ許可の流れ</text>
  <text x="56" y="118" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="500" fill="#6d655f" text-anchor="start">スタンプ取得時は、案内のあとに OS の許可画面が表示されます。</text>
  <rect x="118" y="168" width="360" height="620" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="132" y="182" width="332" height="592" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="228" y="188" width="140" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="146" y="220" width="304" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="166" y="265" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#342d28" text-anchor="start">スタンプ読み取り</text><text x="434" y="265" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="600" fill="#8a7f77" text-anchor="end">STEP 1</text><rect x="158" y="320" width="280" height="200" rx="26" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="184" y="382" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="700" fill="#433832" text-anchor="start">カメラを使用します。</text><text x="184" y="422" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="700" fill="#433832" text-anchor="start">許可してください。</text><rect x="184" y="460" width="228" height="52" rx="22" fill="#f5e6dd" stroke="#d5b8a9" stroke-width="2" /><text x="298.0" y="493.7" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#463a34" text-anchor="middle">続ける</text><rect x="176" y="454" width="244" height="64" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="610" y="168" width="360" height="620" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="624" y="182" width="332" height="592" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="720" y="188" width="140" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="638" y="220" width="304" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="658" y="265" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#342d28" text-anchor="start">確認画面</text><text x="926" y="265" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="600" fill="#8a7f77" text-anchor="end">STEP 2</text><rect x="648" y="320" width="284" height="220" rx="26" fill="#ffffff" stroke="#ddd3ca" stroke-width="2" /><text x="676" y="382" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="25" font-weight="700" fill="#433832" text-anchor="start">このアプリに</text><text x="676" y="418" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="25" font-weight="700" fill="#433832" text-anchor="start">カメラへのアクセスを</text><text x="676" y="454" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="25" font-weight="700" fill="#433832" text-anchor="start">許可しますか？</text><rect x="676" y="470" width="112" height="50" rx="22" fill="#eef3e7" stroke="#c7d2bc" stroke-width="2" /><text x="732.0" y="502.7" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#526147" text-anchor="middle">許可</text><rect x="804" y="470" width="116" height="50" rx="22" fill="#fff6f2" stroke="#dfc9bb" stroke-width="2" /><text x="862.0" y="501.3" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="18" font-weight="700" fill="#7f5643" text-anchor="middle">許可しない</text><rect x="668" y="464" width="128" height="62" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="1024" y="190" width="316" height="580" rx="28" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="1052" y="258" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start">1. まずアプリ内の案内が出ます。</text><text x="1052" y="294" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start">2. 次に iPhone / Android の確認画面が出ます。</text><text x="1052" y="330" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start">3. 赤枠の「許可」を押すとカメラが起動します。</text><text x="1052" y="366" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start"></text><text x="1052" y="402" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start">もし以前に拒否したことがある場合は、</text><text x="1052" y="438" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="19" font-weight="500" fill="#615852" text-anchor="start">次の画像の設定方法を確認してください。</text>
</svg>