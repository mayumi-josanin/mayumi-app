/text><rect x="582" y="356" width="336" height="88" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="582" y="590" width="336" height="92" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="1024" y="210" width="296" height="532" rx="28" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="1056" y="268" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start">機種変更や再インストールでは</text><text x="1056" y="310" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start">新規登録ではなく復元を使います。</text><text x="1056" y="352" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start"></text><text x="1056" y="394" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start">1. 旧端末で引き継ぎコードを発行</text><text x="1056" y="436" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start">2. 新端末でコードと新しいパスコードを入力</text><text x="1056" y="478" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="500" fill="#615852" text-anchor="start">3. 「ログインして復元する」を押す</text>
