<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7efe7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="860" fill="url(#bg)"/>
  <rect x="24" y="24" width="1392" height="812" rx="36" fill="none" stroke="#e0d7ce" stroke-width="2"/>
  <text x="56" y="78" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="40" font-weight="800" fill="#332b27" text-anchor="start">カメラが起動しないときの設定場所</text>
  <text x="56" y="118" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="500" fill="#6d655f" text-anchor="start">iPhone と Android で設定場所が異なります。</text>
  <rect x="70" y="150" width="620" height="660" rx="30" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="104" y="196" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#3c332e" text-anchor="start">iPhone / Safari の設定</text><rect x="112" y="234" width="250" height="500" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="126" y="248" width="222" height="472" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="222" y="254" width="30" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="140" y="286" width="194" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="160" y="331" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#342d28" text-anchor="start">設定</text><text x="318" y="331" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="600" fill="#8a7f77" text-anchor="end">iPhone</text><rect x="138" y="320" width="198" height="270" rx="22" fill="#fff" stroke="#e3d9d0" stroke-width="2" /><text x="160" y="356" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">Safari</text><text x="160" y="396" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="18" font-weight="700" fill="#4a3d36" text-anchor="start">Webサイトの設定</text><text x="160" y="436" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">カメラ</text><text x="160" y="476" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">許可</text><rect x="150" y="334" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="150" y="418" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="150" y="458" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><text x="394" y="314" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="21" font-weight="500" fill="#615852" text-anchor="start">ホーム画面追加版でも、</text><text x="394" y="354" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="21" font-weight="500" fill="#615852" text-anchor="start">iPhone は Safari のカメラ設定を使います。</text><text x="394" y="394" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="21" font-weight="500" fill="#615852" text-anchor="start"></text><text x="394" y="434" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="21" font-weight="500" fill="#615852" text-anchor="start">設定 → Safari → Webサイトの設定 →</text><text x="394" y="474" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="21" font-weight="500" fill="#615852" text-anchor="start">カメラ → 許可</text><rect x="746" y="150" width="620" height="660" rx="30" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="780" y="196" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#3c332e" text-anchor="start">Android の設定</text><rect x="790" y="234" width="250" height="500" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="804" y="248" width="222" height="472" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="900" y="254" width="30" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="818" y="286" width="194" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="838" y="331" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#342d28" text-anchor="start">設定</text><text x="996" y="331" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="600" fill="#8a7f77" text-anchor="end">Android</text><rect x="816" y="320" width="198" height="270" rx="22" fill="#fff" stroke="#e3d9d0" stroke-width="2" /><text x="838" y="356" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">アプリ</text><text x="838" y="396" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">権限</text><text x="838" y="436" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">カメラ</text><text x="838" y="476" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="18" font-weight="700" fill="#4a3d36" text-anchor="start">使用中のみ許可</text><rect x="828" y="374" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="828" y="414" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="828" y="454" width="176" height="36" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><text x="1072" y="314" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">Android は、</text><text x="1072" y="350" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">設定 → アプリ → 権限 → カメラ</text><text x="1072" y="386" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">で確認できます。</text><text x="1072" y="422" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start"></text><text x="1072" y="458" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">Chrome マーク付きのアイコンでは、</text><text x="1072" y="494" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">Chrome → サイトの設定 → カメラ</text><text x="1072" y="530" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="500" fill="#615852" text-anchor="start">も確認してください。</text>
</svg>