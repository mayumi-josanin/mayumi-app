<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7efe7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="860" fill="url(#bg)"/>
  <rect x="24" y="24" width="1392" height="812" rx="36" fill="none" stroke="#e0d7ce" stroke-width="2"/>
  <text x="56" y="78" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="40" font-weight="800" fill="#332b27" text-anchor="start">ホーム画面への追加</text>
  <text x="56" y="118" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" font-weight="500" fill="#6d655f" text-anchor="start">iPhone は Safari、Android は Chrome から追加します。</text>
  <rect x="70" y="150" width="620" height="660" rx="30" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="104" y="198" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#3c332e" text-anchor="start">iPhone / Safari</text><rect x="112" y="228" width="260" height="500" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="126" y="242" width="232" height="472" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="222" y="248" width="40" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="140" y="280" width="204" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="166" y="325" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="700" fill="#342d28" text-anchor="start">Safari</text><text x="322" y="325" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="600" fill="#8a7f77" text-anchor="end">Aa</text><rect x="138" y="316" width="208" height="260" rx="22" fill="#fff" stroke="#e3d9d0" stroke-width="2" /><text x="160" y="356" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="25" font-weight="700" fill="#4a3d36" text-anchor="start">共有</text><text x="160" y="396" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">ホーム画面に追加</text><text x="160" y="436" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">Webアプリとして開く</text><rect x="150" y="380" width="186" height="42" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="282" y="678" width="54" height="38" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="404" y="262" width="220" height="56" rx="20" fill="#fff4f4" stroke="#e23232" stroke-width="3" /><text x="514" y="297" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#b01e1e" text-anchor="middle">共有→追加</text><text x="404" y="346" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">1. Safari でアプリページを開きます。</text><text x="404" y="398" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">2. 共有ボタンを押します。</text><text x="404" y="450" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">3. 「ホーム画面に追加」を選びます。</text><rect x="746" y="150" width="620" height="660" rx="30" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="780" y="198" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#3c332e" text-anchor="start">Android / Chrome</text><rect x="790" y="228" width="260" height="500" rx="42" fill="#24201d" stroke="#24201d" stroke-width="2" /><rect x="804" y="242" width="232" height="472" rx="34" fill="#f7f1ea" stroke="#1d1916" stroke-width="2" /><rect x="900" y="248" width="40" height="18" rx="9" fill="#181513" stroke="#181513" stroke-width="0" /><rect x="818" y="280" width="204" height="74" rx="22" fill="#fffaf6" stroke="#e1d7ce" stroke-width="2" /><text x="844" y="325" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="700" fill="#342d28" text-anchor="start">Chrome</text><text x="1000" y="325" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="600" fill="#8a7f77" text-anchor="end">︙</text><rect x="816" y="316" width="208" height="260" rx="22" fill="#fff" stroke="#e3d9d0" stroke-width="2" /><text x="838" y="356" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">ホーム画面に追加</text><text x="838" y="396" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">アプリをインストール</text><text x="838" y="436" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#4a3d36" text-anchor="start">サイトの設定</text><rect x="828" y="338" width="184" height="42" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="958" y="678" width="50" height="38" rx="24" fill="none" stroke="#e23232" stroke-width="8" /><rect x="1084" y="262" width="220" height="56" rx="20" fill="#fff4f4" stroke="#e23232" stroke-width="3" /><text x="1194" y="297" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#b01e1e" text-anchor="middle">︙→追加</text><text x="1084" y="346" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">1. Chrome でアプリページを開きます。</text><text x="1084" y="392" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">2. 右上の「︙」を押します。</text><text x="1084" y="438" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">3. 「ホーム画面に追加」または</text><text x="1084" y="484" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="23" font-weight="500" fill="#615852" text-anchor="start">   「アプリをインストール」を選びます。</text>
</svg>