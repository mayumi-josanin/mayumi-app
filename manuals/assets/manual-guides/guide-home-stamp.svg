600" y="180" width="700" height="590" rx="28" fill="#fff" stroke="#ddd3ca" stroke-width="2" /><text x="638" y="250" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="600" fill="#473a34" text-anchor="start">ホーム画面では、赤枠の場所をよく使います。</text><text x="638" y="294" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="600" fill="#473a34" text-anchor="start"></text><text x="638" y="338" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="600" fill="#473a34" text-anchor="start">・スタンプを取りたいときは「📷 カメラを起動して読み取る」</text><text x="638" y="382" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="600" fill="#473a34" text-anchor="start">・メニューを見たいときは「メニュー一覧を見る 🍴」</text><text x="638" y="426" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="600" fill="#473a34" text-anchor="start">・NEWS を見たいときは「もっと見る」</text><rect x="638" y="542" width="220" height="56" rx="20" fill="#fff4f4" stroke="#e23232" stroke-width="3" /><text x="748" y="577" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#b01e1e" text-anchor="middle">赤枠を押します</text>
